name: Build Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements_build.txt

      - name: Build Windows executable
        run: |
          pyinstaller build_config.spec

      - name: Create release package
        run: |
          mkdir release
          copy dist\TelegramFilter.exe release\
          copy config.example.json release\
          copy 使用说明.txt release\

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: TelegramFilter-Windows
          path: release/

  build-macos:
    runs-on: macos-latest  # Apple Silicon (兼容 Intel Mac 通过 Rosetta 2)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip3 install -r requirements_build.txt

      - name: Build macOS executable
        run: |
          pyinstaller build_config.spec

      - name: Create release package
        run: |
          mkdir release
          cp -r dist/TelegramFilter.app release/
          cp config.example.json release/
          cp 使用说明.txt release/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: TelegramFilter-macOS
          path: release/

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: TelegramFilter-Windows
          path: windows-release

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: TelegramFilter-macOS
          path: macos-release

      - name: Create zip files
        run: |
          cd windows-release && zip -r ../TelegramFilter-Windows.zip . && cd ..
          cd macos-release && zip -r ../TelegramFilter-macOS.zip . && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            TelegramFilter-Windows.zip
            TelegramFilter-macOS.zip
          body: |
            ## 下载说明

            - **Windows 用户**: 下载 `TelegramFilter-Windows.zip`
            - **macOS 用户**: 下载 `TelegramFilter-macOS.zip`
              - Apple Silicon (M1/M2/M3) 芯片：原生支持
              - Intel 芯片：通过 Rosetta 2 运行（首次打开时系统会自动安装 Rosetta 2）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
