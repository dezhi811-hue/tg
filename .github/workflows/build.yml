name: Build Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements_build.txt

      - name: Build Windows executable
        run: |
          pyinstaller build_config.spec

      - name: Create release package
        run: |
          mkdir release
          copy dist\TelegramFilter.exe release\
          copy config_example.json release\
          copy 使用说明.txt release\

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v3
        with:
          name: TelegramFilter-Windows
          path: release/

  build-macos-intel:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip3 install -r requirements_build.txt

      - name: Build macOS executable
        run: |
          pyinstaller build_config.spec

      - name: Create release package
        run: |
          mkdir release
          cp -r dist/TelegramFilter.app release/
          cp config_example.json release/
          cp 使用说明.txt release/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v3
        with:
          name: TelegramFilter-macOS-Intel
          path: release/

  create-release:
    needs: [build-windows, build-macos-intel]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v3
        with:
          name: TelegramFilter-Windows
          path: windows-release

      - name: Download macOS artifact
        uses: actions/download-artifact@v3
        with:
          name: TelegramFilter-macOS-Intel
          path: macos-release

      - name: Create zip files
        run: |
          cd windows-release && zip -r ../TelegramFilter-Windows.zip . && cd ..
          cd macos-release && zip -r ../TelegramFilter-macOS-Intel.zip . && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            TelegramFilter-Windows.zip
            TelegramFilter-macOS-Intel.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
