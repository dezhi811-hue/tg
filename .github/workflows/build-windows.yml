name: Build Windows Release

on:
  push:
    branches: [ main ]
    paths:
      - 'telegram_filter/**'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        cd telegram_filter
        python -m pip install --upgrade pip
        pip install -r requirements_build.txt

    - name: Build Windows executable
      run: |
        cd telegram_filter
        pyinstaller build_config.spec

    - name: Create release package
      run: |
        cd telegram_filter/dist
        mkdir TelegramFilter-Windows
        copy TelegramFilter.exe TelegramFilter-Windows\
        copy ..\config.example.json TelegramFilter-Windows\ 2>$null || echo "config.example.json not found"
        copy ..\使用说明.txt TelegramFilter-Windows\ 2>$null || echo "使用说明.txt not found"
        Compress-Archive -Path TelegramFilter-Windows -DestinationPath TelegramFilter-Windows.zip -Force

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TelegramFilter-Windows
        path: telegram_filter/dist/TelegramFilter-Windows.zip
