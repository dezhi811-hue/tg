name: Build Windows Release

on:
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - '**.spec'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_build.txt

    - name: Build Windows executable
      run: |
        pyinstaller build_config.spec

    - name: Create release package
      run: |
        cd dist
        mkdir TelegramFilter-Windows
        copy TelegramFilter.exe TelegramFilter-Windows\
        if (Test-Path ..\config_example.json) { copy ..\config_example.json TelegramFilter-Windows\ }
        if (Test-Path ..\使用说明.txt) { copy ..\使用说明.txt TelegramFilter-Windows\ }
        Compress-Archive -Path TelegramFilter-Windows -DestinationPath TelegramFilter-Windows.zip -Force

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TelegramFilter-Windows
        path: dist/TelegramFilter-Windows.zip

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
      shell: bash

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.date.outputs.date }}
        name: Windows Build ${{ steps.date.outputs.date }}
        files: dist/TelegramFilter-Windows.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
